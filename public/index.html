<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Preview Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#12151a;
    --panel-2:#171b21;
    --line:#232830;
    --text:#e6e9ee;
    --muted:#8b93a1;
    --accent:#5eead4;
    --accent-dim:#0f2e29;
    --danger:#ff6b6b;
    --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:12px 18px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);}
  .brand h1{font-size:14px;font-weight:600;margin:0;letter-spacing:.2px;}
  .brand span{color:var(--muted);font-size:12px;}
  .layout{
    flex:1;
    display:flex;
    min-height:0;
  }
  .sidebar{
    width:230px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .sidebar h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--muted);
    padding:14px 14px 8px;
    margin:0;
  }
  .history-list{
    overflow-y:auto;
    flex:1;
    padding:0 8px 12px;
  }
  .history-item{
    padding:9px 10px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:4px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
  }
  .history-item:hover{background:var(--panel-2);}
  .history-item .meta{overflow:hidden;}
  .history-item .name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .history-item .sub{font-size:10.5px;color:var(--muted);}
  .history-item button{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;
    opacity:0;transition:opacity .15s;padding:2px 4px;
  }
  .history-item:hover button{opacity:1;}
  .history-item button:hover{color:var(--danger);}
  .empty-hint{padding:14px;font-size:12px;color:var(--muted);line-height:1.5;}
  .main{
    flex:1;
    display:flex;
    min-width:0;
  }
  .editor-pane, .preview-pane{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .editor-pane{border-right:1px solid var(--line);}
  .pane-toolbar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border-bottom:1px solid var(--line);
    background:var(--panel);
    flex-shrink:0;
  }
  .tabs{display:flex;gap:4px;background:var(--panel-2);padding:3px;border-radius:8px;}
  .tab-btn{
    border:none;background:transparent;color:var(--muted);
    padding:5px 12px;border-radius:6px;font-size:12.5px;cursor:pointer;font-weight:500;
  }
  .tab-btn.active{background:var(--accent-dim);color:var(--accent);}
  .spacer{flex:1;}
  .btn{
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    padding:6px 12px;
    border-radius:7px;
    font-size:12.5px;
    cursor:pointer;
    font-weight:500;
    display:flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:#333a45;}
  .btn.primary{background:var(--accent);color:#04211d;border-color:var(--accent);}
  .btn.primary:hover{filter:brightness(1.05);}
  textarea{
    flex:1;
    width:100%;
    background:#0d0f12;
    color:#dbe2ea;
    border:none;
    outline:none;
    resize:none;
    padding:16px;
    font-family:var(--mono);
    font-size:12.5px;
    line-height:1.6;
    tab-size:2;
  }
  .preview-pane iframe{
    flex:1;
    border:none;
    background:#fff;
    width:100%;
  }
  .status-bar{
    padding:6px 12px;
    font-size:11px;
    color:var(--muted);
    border-top:1px solid var(--line);
    background:var(--panel);
    flex-shrink:0;
  }
  .status-bar.error{color:var(--danger);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#2a303a;border-radius:4px;}

  /* modal */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    display:none;align-items:center;justify-content:center;z-index:50;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:20px;width:320px;
  }
  .modal h3{margin:0 0 12px;font-size:14px;}
  .modal input{
    width:100%;background:#0d0f12;border:1px solid var(--line);color:var(--text);
    padding:8px 10px;border-radius:7px;font-size:13px;margin-bottom:14px;outline:none;
  }
  .modal .row{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="dot"></div>
    <div>
      <h1>Live Preview Studio</h1>
    </div>
    <span>— paste kode React / HTML, langsung lihat hasilnya</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="planBadge" style="font-size:11px;background:var(--panel-2);color:var(--muted);padding:4px 9px;border-radius:6px;"></span>
    <span id="orgLabel" style="font-size:12.5px;color:var(--muted);"></span>
    <a href="/billing.html" style="font-size:12.5px;color:var(--accent);text-decoration:none;">Upgrade</a>
    <button id="logoutBtn" class="btn" style="padding:5px 10px;">Keluar</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <h2>Riwayat</h2>
    <div class="history-list" id="historyList">
      <div class="empty-hint">Belum ada yang disimpan. Klik "Simpan" setelah run untuk menyimpan kode ke riwayat.</div>
    </div>
  </aside>

  <div class="main">
    <div class="editor-pane">
      <div class="pane-toolbar">
        <div class="tabs">
          <button class="tab-btn active" data-type="react" id="tabReact">React</button>
          <button class="tab-btn" data-type="html" id="tabHtml">HTML</button>
        </div>
        <div class="spacer"></div>
        <button class="btn" id="clearBtn">Kosongkan</button>
        <button class="btn" id="saveBtn">Simpan</button>
        <button class="btn primary" id="runBtn">▶ Run</button>
      </div>
      <textarea id="codeInput" placeholder="Paste kode React (satu file, export default function App...) atau kode HTML di sini..." spellcheck="false"></textarea>
      <div class="status-bar" id="statusBar">Siap. Paste kode, lalu klik Run.</div>
    </div>

    <div class="preview-pane">
      <div class="pane-toolbar">
        <span style="font-size:12px;color:var(--muted);">Preview</span>
        <div class="spacer"></div>
        <button class="btn" id="openTabBtn">Buka di tab baru</button>
        <button class="btn" id="resetDataBtn" title="Hapus semua data hasil edit di preview (kembali ke data awal kode)">Reset data</button>
      </div>
      <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="saveModal">
  <div class="modal">
    <h3>Simpan kode ini</h3>
    <input type="text" id="saveNameInput" placeholder="Nama project, misal: Landing Exist Detailing" />
    <div class="row">
      <button class="btn" id="cancelSaveBtn">Batal</button>
      <button class="btn primary" id="confirmSaveBtn">Simpan</button>
    </div>
  </div>
</div>

<script>
let currentType = 'react';
const codeInput = document.getElementById('codeInput');
const statusBar = document.getElementById('statusBar');
const previewFrame = document.getElementById('previewFrame');

// ---------- Info akun & paket ----------
async function loadMe(){
  try {
    const res = await fetch('/api/me');
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    const me = await res.json();
    document.getElementById('orgLabel').textContent = me.org ? me.org.name : '';
    document.getElementById('planBadge').textContent = me.org && me.org.plan === 'pro' ? 'Pro' : 'Gratis';
  } catch (e) { /* biarkan, jangan blok UI */ }
}
loadMe();

document.getElementById('logoutBtn').onclick = async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
};

// ---------- ID project (dipakai buat kunci data live di server) ----------
// Dibuat dari isi kode itu sendiri, jadi otomatis konsisten tanpa perlu simpan dulu.
function hashCode(str){
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) + h) + str.charCodeAt(i);
    h = h & h;
  }
  return 'p' + Math.abs(h).toString(36);
}

document.getElementById('resetDataBtn').onclick = async () => {
  if (!confirm('Hapus semua data hasil edit di preview untuk project ini? Data akan kembali ke isi awal kode.')) return;
  const projectId = hashCode(codeInput.value.trim());
  try {
    await fetch('/api/data/' + encodeURIComponent(projectId), { method: 'DELETE' });
  } catch (e) { /* server mungkin belum jalan */ }
  statusBar.textContent = 'Data preview direset. Klik Run untuk memuat ulang.';
  runPreview();
};

// ---------- Tabs ----------
document.getElementById('tabReact').onclick = () => setType('react');
document.getElementById('tabHtml').onclick = () => setType('html');
function setType(t){
  currentType = t;
  document.getElementById('tabReact').classList.toggle('active', t === 'react');
  document.getElementById('tabHtml').classList.toggle('active', t === 'html');
  codeInput.placeholder = t === 'react'
    ? 'Paste kode React (satu file, export default function App...) di sini...'
    : 'Paste kode HTML di sini...';
}

// ---------- Shim untuk Firebase, ikon, chart, dll (semua lokal, tanpa internet) ----------
const RUNNER_SHIMS_SRC = `
window.__firebaseShim = (function(){
  var __store = window.__initialFirestoreStore ? JSON.parse(JSON.stringify(window.__initialFirestoreStore)) : {};
  var __listeners = [];
  var __syncTimer = null;
  function __sync(){
    clearTimeout(__syncTimer);
    __syncTimer = setTimeout(function(){
      try {
        fetch('/api/data/' + encodeURIComponent(window.__projectId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(__store)
        }).catch(function(){});
      } catch(e) {}
    }, 250);
  }
  function __path(ref){ return ref.__path; }
  function __docSnap(path){
    var data = __store[path];
    return { exists: function(){ return data !== undefined; }, data: function(){ return data; }, id: path.split('/').pop() };
  }
  function __colSnap(path){
    var docs = Object.keys(__store).filter(function(p){
      return p.indexOf(path + '/') === 0 && p.split('/').length === path.split('/').length + 1;
    }).map(function(p){ return { id: p.split('/').pop(), data: function(){ return __store[p]; } }; });
    return { empty: docs.length === 0, docs: docs, size: docs.length, forEach: function(fn){ docs.forEach(fn); } };
  }
  function __notify(path){
    __listeners.forEach(function(l){
      if (l.type === 'doc' && l.path === path) l.cb(__docSnap(path));
      else if (l.type === 'collection' && path.indexOf(l.path + '/') === 0) l.cb(__colSnap(l.path));
    });
  }
  return {
    initializeApp: function(config){ return { __mock: true, config: config }; },
    getAuth: function(){ return { __mock: true }; },
    signInAnonymously: function(){ return Promise.resolve({ user: { uid: 'preview-user' } }); },
    signInWithCustomToken: function(){ return Promise.resolve({ user: { uid: 'preview-user' } }); },
    onAuthStateChanged: function(auth, cb){ setTimeout(function(){ cb({ uid: 'preview-user' }); }, 0); return function(){}; },
    signOut: function(){ return Promise.resolve(); },
    getFirestore: function(){ return { __mock: true }; },
    collection: function(db){ var segs = Array.prototype.slice.call(arguments, 1); return { __ref: true, type: 'collection', __path: segs.join('/') }; },
    doc: function(refOrDb){
      var segs = Array.prototype.slice.call(arguments, 1);
      var base = (refOrDb && refOrDb.__path) ? refOrDb.__path : '';
      var path;
      if (segs.length === 0) { path = base + '/' + Math.random().toString(36).slice(2, 10); }
      else { path = (base ? base + '/' : '') + segs.join('/'); }
      return { __ref: true, type: 'doc', __path: path };
    },
    setDoc: function(ref, data, opts){
      var path = __path(ref);
      __store[path] = (opts && opts.merge && __store[path]) ? Object.assign({}, __store[path], data) : Object.assign({}, data);
      __notify(path); __notify(path.split('/').slice(0, -1).join('/'));
      __sync();
      return Promise.resolve();
    },
    addDoc: function(ref, data){
      var path = __path(ref) + '/' + Math.random().toString(36).slice(2, 10);
      __store[path] = Object.assign({}, data);
      __notify(path); __notify(__path(ref));
      __sync();
      return Promise.resolve({ id: path.split('/').pop() });
    },
    updateDoc: function(ref, data){
      var path = __path(ref);
      __store[path] = Object.assign({}, __store[path] || {}, data);
      __notify(path); __notify(path.split('/').slice(0, -1).join('/'));
      __sync();
      return Promise.resolve();
    },
    deleteDoc: function(ref){
      var path = __path(ref);
      delete __store[path];
      __notify(path); __notify(path.split('/').slice(0, -1).join('/'));
      __sync();
      return Promise.resolve();
    },
    onSnapshot: function(ref, cb){
      __listeners.push({ type: ref.type, path: ref.__path, cb: cb });
      setTimeout(function(){ cb(ref.type === 'doc' ? __docSnap(ref.__path) : __colSnap(ref.__path)); }, 0);
      return function(){};
    },
    getDocs: function(ref){ return Promise.resolve(ref.type === 'doc' ? __docSnap(ref.__path) : __colSnap(ref.__path)); },
    getDoc: function(ref){ return Promise.resolve(__docSnap(ref.__path)); },
    query: function(ref){ return ref; },
    where: function(){ return {}; },
    orderBy: function(){ return {}; },
    limit: function(){ return {}; },
    serverTimestamp: function(){ return Date.now(); },
    getStorage: function(){ return { __mock: true }; },
    ref: function(){ return { __mock: true }; },
    uploadBytes: function(){ return Promise.resolve({ __mock: true }); },
    getDownloadURL: function(){ return Promise.resolve('https://placehold.co/600x400?text=Preview+Image'); }
  };
})();

window.__lucideShim = new Proxy({}, {
  get: function(target, prop){
    if (typeof prop !== 'string' || prop === 'default') return undefined;
    return function(props){
      props = props || {};
      return React.createElement('svg', Object.assign({
        xmlns: 'http://www.w3.org/2000/svg', width: 24, height: 24, viewBox: '0 0 24 24',
        fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round'
      }, props), React.createElement('circle', { cx: 12, cy: 12, r: 9 }));
    };
  }
});

window.__rechartsShim = new Proxy({}, {
  get: function(target, prop){
    return function(props){
      props = props || {};
      return React.createElement('div', { style: { padding: 10, border: '1px dashed #b7b7b7', borderRadius: 8, color: '#8a8a8a', fontSize: 12, textAlign: 'center' } }, props.children || ('[chart: ' + String(prop) + ']'));
    };
  }
});

window.__framerShim = new Proxy({}, {
  get: function(target, prop){
    if (prop === 'motion') {
      return new Proxy({}, {
        get: function(t2, tag){
          return function(props){ props = props || {}; return React.createElement(String(tag), props, props.children); };
        }
      });
    }
    if (prop === 'AnimatePresence') return function(props){ return React.createElement(React.Fragment, null, (props || {}).children); };
    return function(props){ return React.createElement('div', props, (props || {}).children); };
  }
});

window.__genericShim = function(name){
  var fn = function(){
    var args = Array.prototype.slice.call(arguments);
    return args.filter(Boolean).join(' ');
  };
  return new Proxy(fn, {
    get: function(target, prop){
      if (prop === 'default') return fn;
      return function(props){ return React.createElement('div', props, (props || {}).children); };
    }
  });
};
`;

// ---------- Ubah "import ... from '...';" jadi ambil dari shim global (tanpa internet) ----------
function moduleToGlobalExpr(name){
  if (name === 'react') return 'window.React';
  if (name === 'react-dom' || name === 'react-dom/client') return 'window.ReactDOM';
  if (name.indexOf('firebase') === 0) return 'window.__firebaseShim';
  if (name === 'lucide-react') return 'window.__lucideShim';
  if (name === 'recharts') return 'window.__rechartsShim';
  if (name === 'framer-motion') return 'window.__framerShim';
  return "window.__genericShim('" + name.replace(/'/g, "") + "')";
}

function rewriteImports(code){
  return code.replace(/import\s+([^;]+?)\s+from\s+['"]([^'"]+)['"];?/g, function(match, bindings, moduleName){
    const glob = moduleToGlobalExpr(moduleName);
    bindings = bindings.trim();
    let m;
    if ((m = bindings.match(/^\*\s+as\s+(\w+)$/))) {
      return `const ${m[1]} = ${glob};`;
    }
    if ((m = bindings.match(/^(\w+)\s*,\s*\{([^}]*)\}$/))) {
      return `const ${m[1]} = (${glob}).default !== undefined ? (${glob}).default : (${glob}); const {${m[2]}} = ${glob};`;
    }
    if ((m = bindings.match(/^\{([^}]*)\}$/))) {
      return `const {${m[1]}} = ${glob};`;
    }
    if ((m = bindings.match(/^(\w+)$/))) {
      return `const ${m[1]} = (${glob}).default !== undefined ? (${glob}).default : (${glob});`;
    }
    return '';
  });
}

function extractDefaultComponentName(code){
  let m;
  if ((m = code.match(/export\s+default\s+function\s+(\w+)/))) return m[1];
  if ((m = code.match(/export\s+default\s+class\s+(\w+)/))) return m[1];
  if ((m = code.match(/export\s+default\s+(\w+)\s*;/))) return m[1];
  return null;
}

function stripExports(code){
  code = code.replace(/export\s+default\s+function\s+(\w+)/, 'function $1');
  code = code.replace(/export\s+default\s+class\s+(\w+)/, 'class $1');
  code = code.replace(/export\s+default\s+\w+\s*;/g, '');
  code = code.replace(/export\s+\{[^}]*\}\s*;?/g, '');
  code = code.replace(/export\s+const\s/g, 'const ');
  code = code.replace(/export\s+function\s/g, 'function ');
  return code;
}

// ---------- Build & run preview ----------
function buildReactDoc(code){
  let componentName = extractDefaultComponentName(code) || 'App';
  let processed = rewriteImports(code);
  processed = stripExports(processed);

  let transformed;
  try {
    transformed = Babel.transform(processed, { presets: ['react'] }).code;
  } catch (e) {
    return errorDoc('Gagal mem-parsing kode (syntax error):\n' + e.message);
  }

  const mountCode = `
;(function(){
  try {
    var __Comp = (typeof ${componentName} !== 'undefined') ? ${componentName} : (typeof App !== 'undefined' ? App : null);
    if (!__Comp) throw new Error('Tidak ditemukan komponen React untuk dirender. Pastikan ada "export default function NamaKomponen() {...}" di kode.');
    var __root = ReactDOM.createRoot(document.getElementById('root'));
    __root.render(React.createElement(__Comp));
  } catch (e) {
    var el = document.getElementById('error-overlay');
    el.style.display = 'block';
    el.textContent = 'Error saat render:\n' + e.message + (e.stack ? '\n\n' + e.stack : '');
  }
})();`;

  const projectId = hashCode(code.trim());
  const combined = RUNNER_SHIMS_SRC + '\n' + transformed + '\n' + mountCode;
  const combinedEscaped = JSON.stringify(combined);

  return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"><\/script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"><\/script>
<script src="https://cdn.tailwindcss.com"><\/script>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  #error-overlay{
    display:none;position:fixed;inset:0;background:#1a0000;color:#ff9c9c;
    font-family:ui-monospace,monospace;font-size:13px;padding:24px;white-space:pre-wrap;
    overflow:auto;z-index:9999;line-height:1.6;
  }
  #loading-badge{
    position:fixed;bottom:10px;right:10px;background:#111;color:#8b93a1;font-size:11px;
    padding:4px 8px;border-radius:5px;font-family:ui-monospace,monospace;z-index:9998;
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="error-overlay"></div>
<div id="loading-badge">Memuat data...</div>
<script>
  window.__app_id = 'preview-app';
  window.__firebase_config = '{}';
  window.__projectId = ${JSON.stringify(projectId)};
  window.onerror = function(msg, src, line, col, err){
    var el = document.getElementById('error-overlay');
    el.style.display = 'block';
    el.textContent = 'Runtime error:\n' + msg + (err && err.stack ? '\n\n' + err.stack : '');
    return true;
  };
  window.addEventListener('unhandledrejection', function(e){
    var el = document.getElementById('error-overlay');
    el.style.display = 'block';
    el.textContent = 'Unhandled error:\n' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
  });

  // Ambil data yang sudah tersimpan di server DULU, baru jalankan komponennya.
  // Ini penting biar data lama tidak ketiban/ketimpa data bawaan kode tiap kali dibuka.
  (function(){
    fetch('/api/data/' + encodeURIComponent(window.__projectId))
      .then(function(r){ return r.ok ? r.json() : {}; })
      .catch(function(){ return {}; })
      .then(function(store){
        window.__initialFirestoreStore = store || {};
        var badge = document.getElementById('loading-badge');
        if (badge) badge.remove();
        var s = document.createElement('script');
        s.textContent = ${combinedEscaped};
        document.body.appendChild(s);
      });
  })();
<\/script>
</body>
</html>`;
}


function buildHtmlDoc(code){
  const hasTailwind = /tailwindcss/i.test(code) || /cdn\.tailwindcss/i.test(code);
  const tailwindTag = hasTailwind ? '' : '<script src="https://cdn.tailwindcss.com"><\/script>';
  const looksFullDoc = /<html[\s>]/i.test(code);
  if (looksFullDoc) {
    return code.replace(/<head>/i, '<head>' + tailwindTag);
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8" />${tailwindTag}</head><body>${code}</body></html>`;
}

function errorDoc(message){
  return `<!DOCTYPE html><html><body style="margin:0;background:#1a0000;color:#ff9c9c;font-family:ui-monospace,monospace;font-size:13px;padding:24px;white-space:pre-wrap;">${message.replace(/</g,'&lt;')}</body></html>`;
}

function runPreview(){
  const code = codeInput.value.trim();
  if (!code) {
    statusBar.textContent = 'Kotak kode masih kosong.';
    statusBar.classList.add('error');
    return;
  }
  statusBar.classList.remove('error');
  statusBar.textContent = 'Menjalankan preview...';

  const doc = currentType === 'react' ? buildReactDoc(code) : buildHtmlDoc(code);
  previewFrame.srcdoc = doc;

  setTimeout(() => {
    statusBar.textContent = 'Preview berjalan (' + (currentType === 'react' ? 'React' : 'HTML') + ').';
  }, 150);
}

document.getElementById('runBtn').onclick = runPreview;
document.getElementById('clearBtn').onclick = () => {
  codeInput.value = '';
  previewFrame.srcdoc = '';
  statusBar.textContent = 'Siap. Paste kode, lalu klik Run.';
  statusBar.classList.remove('error');
};
document.getElementById('openTabBtn').onclick = () => {
  const doc = previewFrame.srcdoc;
  if (!doc) {
    statusBar.textContent = 'Klik Run dulu, baru bisa dibuka di tab baru.';
    statusBar.classList.add('error');
    return;
  }
  const blob = new Blob([doc], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if (!win) {
    // Kalau tab baru diblokir (sering terjadi kalau file ini dibuka lewat preview Claude),
    // otomatis unduh saja file preview-nya supaya tetap bisa dibuka di browser biasa.
    const a = document.createElement('a');
    a.href = url;
    a.download = 'preview.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    statusBar.textContent = 'Tab baru diblokir, jadi file "preview.html" otomatis kedownload. Buka file itu pakai browser kamu.';
    statusBar.classList.add('error');
  }
};

// Jalankan otomatis 1 detik setelah berhenti mengetik/paste (biar terasa "live")
let autorunTimer = null;
codeInput.addEventListener('input', () => {
  clearTimeout(autorunTimer);
  autorunTimer = setTimeout(runPreview, 900);
});

// ---------- Riwayat (disimpan di server, dibagi ke semua orang di tim) ----------
const historyList = document.getElementById('historyList');
const saveModal = document.getElementById('saveModal');
const saveNameInput = document.getElementById('saveNameInput');

document.getElementById('saveBtn').onclick = () => {
  if (!codeInput.value.trim()) { return; }
  saveNameInput.value = '';
  saveModal.classList.add('show');
  saveNameInput.focus();
};
document.getElementById('cancelSaveBtn').onclick = () => saveModal.classList.remove('show');
document.getElementById('confirmSaveBtn').onclick = async () => {
  const name = saveNameInput.value.trim() || ('Tanpa nama - ' + new Date().toLocaleString('id-ID'));
  try {
    const res = await fetch('/api/snippets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, type: currentType, code: codeInput.value })
    });
    if (res.status === 402) {
      const data = await res.json();
      saveModal.classList.remove('show');
      if (confirm((data.error || 'Paket gratis sudah penuh.') + '\n\nBuka halaman upgrade sekarang?')) {
        window.location.href = '/billing.html';
      }
      return;
    }
    if (!res.ok) throw new Error('Server menolak permintaan');
    saveModal.classList.remove('show');
    loadHistory();
  } catch (e) {
    alert('Gagal menyimpan. Pastikan servernya sedang jalan. Detail: ' + e.message);
  }
};
saveNameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('confirmSaveBtn').click();
});

async function loadHistory(){
  try {
    const res = await fetch('/api/snippets');
    if (!res.ok) throw new Error('gagal ambil data');
    const items = await res.json();
    if (!items || items.length === 0) {
      historyList.innerHTML = '<div class="empty-hint">Belum ada yang disimpan. Klik "Simpan" setelah run untuk menyimpan kode ke riwayat.</div>';
      return;
    }
    historyList.innerHTML = '';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'history-item';
      const date = item.savedAt ? new Date(item.savedAt).toLocaleDateString('id-ID') : '';
      el.innerHTML = `
        <div class="meta">
          <div class="name">${escapeHtml(item.name || 'Tanpa nama')}</div>
          <div class="sub">${item.type === 'react' ? 'React' : 'HTML'} · ${date}</div>
        </div>
        <button title="Hapus">✕</button>
      `;
      el.querySelector('.meta').onclick = () => {
        codeInput.value = item.code;
        setType(item.type);
        runPreview();
      };
      el.querySelector('button').onclick = async (e) => {
        e.stopPropagation();
        if (confirm('Hapus "' + item.name + '" dari riwayat?')) {
          await fetch('/api/snippets/' + item.id, { method: 'DELETE' });
          loadHistory();
        }
      };
      historyList.appendChild(el);
    });
  } catch (e) {
    historyList.innerHTML = '<div class="empty-hint">Belum bisa terhubung ke server. Pastikan server (node server.js) sedang jalan.</div>';
  }
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

loadHistory();
</script>
</body>
</html>
