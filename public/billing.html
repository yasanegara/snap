<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upgrade ke Pro — Live Preview Studio</title>
<style>
  :root{ --bg:#0b0d10; --panel:#12151a; --line:#232830; --text:#e6e9ee; --muted:#8b93a1; --accent:#5eead4; }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .card{ width:380px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px; }
  h1{ font-size:18px;margin:0 0 4px; }
  p.sub{ color:var(--muted);font-size:13px;margin:0 0 20px; }
  .price{ font-size:32px;font-weight:700;margin:10px 0 4px; }
  .price span{ font-size:13px;color:var(--muted);font-weight:400; }
  ul{ padding-left:18px;color:#c7ccd4;font-size:13px;line-height:1.9;margin:16px 0 22px; }
  button{
    width:100%;background:var(--accent);color:#04211d;border:none;font-weight:600;
    padding:12px;border-radius:8px;font-size:13.5px;cursor:pointer;
  }
  button:disabled{ opacity:.6;cursor:default; }
  .back{ display:block;text-align:center;margin-top:16px;color:var(--muted);font-size:12.5px;text-decoration:none; }
  .status{ font-size:12.5px;color:var(--muted);margin-top:12px;text-align:center; }
  .badge{ display:inline-block;background:#0f2e29;color:var(--accent);font-size:11px;padding:3px 8px;border-radius:6px;margin-bottom:10px; }
</style>
<script src="https://app.sandbox.midtrans.com/snap/snap.js"></script>
</head>
<body>
  <div class="card">
    <div class="badge" id="planBadge">Memuat...</div>
    <h1>Upgrade ke Pro</h1>
    <p class="sub">Simpan project tanpa batas, buat semua orang di tim</p>
    <div class="price" id="priceText">Rp -<span>/bulan</span></div>
    <ul>
      <li>Simpan project tanpa batas (paket gratis cuma 3)</li>
      <li>Data live preview tersimpan permanen</li>
      <li>Prioritas dukungan tim</li>
    </ul>
    <button id="upgradeBtn">Upgrade Sekarang</button>
    <div class="status" id="statusText"></div>
    <a href="/app" class="back">← Kembali ke aplikasi</a>
  </div>

<script>
let clientKey = '';
async function init(){
  const res = await fetch('/api/billing/info');
  if (res.status === 401) { window.location.href = '/login.html'; return; }
  const data = await res.json();
  clientKey = data.clientKey;
  document.getElementById('priceText').innerHTML = 'Rp ' + data.price.toLocaleString('id-ID') + '<span>/bulan</span>';
  document.getElementById('planBadge').textContent = data.plan === 'pro' ? 'Kamu sudah Pro' : 'Paket saat ini: Gratis';
  if (data.plan === 'pro') {
    document.getElementById('upgradeBtn').disabled = true;
    document.getElementById('upgradeBtn').textContent = 'Sudah Pro';
  }
}
init();

document.getElementById('upgradeBtn').addEventListener('click', async () => {
  const statusEl = document.getElementById('statusText');
  statusEl.textContent = 'Menyiapkan pembayaran...';
  try {
    const res = await fetch('/api/billing/checkout', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { statusEl.textContent = data.error || 'Gagal membuat transaksi.'; return; }
    if (!window.snap) { statusEl.textContent = 'Modul pembayaran belum siap, coba refresh halaman.'; return; }
    window.snap.pay(data.token, {
      onSuccess: () => { statusEl.textContent = 'Pembayaran berhasil! Memuat ulang...'; setTimeout(() => location.reload(), 1200); },
      onPending: () => { statusEl.textContent = 'Menunggu pembayaran kamu selesai.'; },
      onError: () => { statusEl.textContent = 'Pembayaran gagal, coba lagi.'; },
      onClose: () => { statusEl.textContent = 'Jendela pembayaran ditutup.'; }
    });
  } catch (e) {
    statusEl.textContent = 'Gak bisa terhubung ke server.';
  }
});
</script>
</body>
</html>
