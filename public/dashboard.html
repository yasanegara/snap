<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — klikweb.id</title>
<script>
  (function(){
    var saved = localStorage.getItem('studioTheme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
  })();
</script>
<style>
  :root{
    --bg:#0b0d10; --panel:#12151a; --panel-2:#171b21; --line:#232830;
    --text:#e6e9ee; --muted:#8b93a1; --accent:#5eead4; --accent-text:#04211d; --accent-dim:#0f2e29;
    --danger:#ff6b6b; --shadow: 0 1px 3px rgba(0,0,0,.4);
    --sidebar-w:220px;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
  }
  html[data-theme="light"]{
    --bg:#f4f6f8; --panel:#ffffff; --panel-2:#eef1f4; --line:#dde2e8;
    --text:#1a1d23; --muted:#6b7280; --accent:#0f766e; --accent-text:#ffffff; --accent-dim:#d5f3ee;
    --danger:#dc2626; --shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{ background:var(--bg); color:var(--text); font-family:var(--sans); display:flex; }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:var(--sidebar-w); flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
    min-height:100vh; padding:20px 16px; position:sticky; top:0; display:flex; flex-direction:column;
  }
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 22px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);flex-shrink:0;}
  .brand h1{font-size:15.5px;font-weight:700;margin:0;}

  .nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:0 8px;margin:14px 0 6px;}
  .nav-link{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
    color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px;
  }
  .nav-link:hover{background:var(--panel-2);color:var(--text);}
  .nav-link.active{background:var(--accent-dim);color:var(--accent);font-weight:700;}
  .nav-link .ic{width:18px;text-align:center;}

  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);}
  .theme-toggle{
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    width:100%;padding:8px;border-radius:8px;cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px;
  }
  .theme-toggle:hover{background:var(--line);}
  .logout-link{
    display:block;text-align:center;font-size:12.5px;color:var(--muted);text-decoration:none;
    padding:7px;cursor:pointer;
  }
  .logout-link:hover{color:var(--danger);}

  @media (max-width:820px){
    .sidebar{position:fixed;left:0;bottom:0;top:auto;width:100%;min-height:auto;flex-direction:row;
      align-items:center;padding:8px 12px;border-right:none;border-top:1px solid var(--line);z-index:50;}
    .brand,.nav-group-label,.sidebar-footer{display:none;}
    .nav-link{flex-direction:column;gap:2px;font-size:10.5px;padding:6px 10px;}
    body{padding-bottom:60px;}
  }

  /* ---------- Main ---------- */
  main{flex:1;min-width:0;}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;padding:18px 28px;
    border-bottom:1px solid var(--line);background:var(--panel);
  }
  .topbar h2{font-size:17px;margin:0;}
  .topbar .sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .btn{
    background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    padding:9px 16px; border-radius:8px; font-size:13px; cursor:pointer; text-decoration:none;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{border-color:var(--accent);}
  .btn.primary{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:700;}

  .wrap{ max-width:1200px; padding:28px 28px 60px; }

  /* ---------- Stat cards ---------- */
  .stat-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px;
    margin-bottom:34px;
  }
  .stat-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px;
    display:flex; flex-direction:column; gap:8px; position:relative; overflow:hidden;
  }
  .stat-card .stat-icon{
    width:34px;height:34px;border-radius:9px;background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:2px;
  }
  .stat-card .stat-label{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;}
  .stat-card .stat-value{font-size:22px;font-weight:800;line-height:1.2;}
  .stat-card .stat-value.small{font-size:16px;}

  .section-title{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
  }
  .section-title h2{font-size:16px;margin:0;}
  .section-title .count-badge{font-size:11.5px;color:var(--muted);background:var(--panel-2);padding:3px 9px;border-radius:20px;margin-left:8px;}

  .workspace-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px;
  }
  .ws-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px;
    display:flex; flex-direction:column; gap:12px; transition:border-color .15s, transform .15s;
    cursor:pointer;
  }
  .ws-card:hover{border-color:var(--accent);transform:translateY(-2px);}
  .ws-tag{
    font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted);
    font-weight:600;
  }
  .ws-name{font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ws-stats{font-size:12.5px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .ws-stats b{color:var(--text);font-weight:600;}
  .ws-actions{display:flex;gap:8px;margin-top:4px;}
  .ws-actions .btn{flex:1;font-size:12px;padding:8px 6px;text-align:center;justify-content:center;}

  .new-ws-card{
    border:1.5px dashed var(--line); border-radius:14px; padding:18px;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px;
    cursor:pointer; color:var(--muted); font-size:13px; min-height:150px;
    transition:border-color .15s, color .15s;
  }
  .new-ws-card:hover{border-color:var(--accent);color:var(--accent);}
  .new-ws-card .plus{font-size:26px;}

  .empty-hint{padding:30px;text-align:center;color:var(--muted);font-size:13px;}

  .modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
    align-items:center; justify-content:center; z-index:1000;
  }
  .modal-backdrop.show{display:flex;}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;width:340px;}
  .modal h3{margin:0 0 14px;font-size:15px;}
  .modal input[type=text]{
    width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:9px 11px;border-radius:8px;font-size:13px;margin-bottom:14px;
  }
  .modal .row{display:flex;gap:8px;justify-content:flex-end;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand"><span class="dot"></span><h1>klikweb.id</h1></div>

  <div class="nav-group-label">Menu</div>
  <a href="/dashboard.html" class="nav-link active"><span class="ic">🏠</span> Dashboard</a>
  <a href="/app" class="nav-link"><span class="ic">🖥️</span> Studio</a>
  <a href="/billing.html" class="nav-link"><span class="ic">⭐</span> Upgrade ke Pro</a>

  <div class="sidebar-footer">
    <button id="themeToggleBtn" class="theme-toggle" title="Ganti mode terang/gelap">🌙 <span id="themeToggleLabel">Mode Gelap</span></button>
    <a id="logoutBtn" class="logout-link">Keluar</a>
  </div>
</aside>

<main>
  <div class="topbar">
    <div>
      <h2>Dashboard</h2>
      <div class="sub" id="welcomeText">Selamat datang kembali</div>
    </div>
    <a href="/app" class="btn primary">🖥️ Buka Studio</a>
  </div>

  <div class="wrap">
    <div class="stat-grid" id="statGrid">
      <div class="stat-card">
        <div class="stat-icon">💳</div>
        <div class="stat-label">Paket</div>
        <div class="stat-value small" id="accPlan">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-label">Token Tersedia</div>
        <div class="stat-value" id="accToken">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👤</div>
        <div class="stat-label">Jenis Membership</div>
        <div class="stat-value small" id="accRole">...</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📁</div>
        <div class="stat-label">Total Workspace</div>
        <div class="stat-value" id="accWorkspaceCount">...</div>
      </div>
    </div>

    <div class="section-title">
      <h2>Workspace Kamu <span class="count-badge" id="wsCountBadge"></span></h2>
    </div>
    <div class="workspace-grid" id="workspaceGrid">
      <div class="empty-hint">Memuat...</div>
    </div>
  </div>
</main>

<div class="modal-backdrop" id="workspaceModal">
  <div class="modal">
    <h3>Bikin Workspace Baru</h3>
    <input type="text" id="workspaceNameInput" placeholder="Nama workspace, misal: Klien Bengkel Sleman" />
    <div class="row">
      <button class="btn" id="cancelWorkspaceBtn">Batal</button>
      <button class="btn primary" id="confirmWorkspaceBtn">Buat</button>
    </div>
  </div>
</div>

<script>
function applyThemeIcon(){
  const theme = document.documentElement.getAttribute('data-theme') || 'dark';
  document.getElementById('themeToggleBtn').firstChild.textContent = theme === 'dark' ? '🌙 ' : '☀️ ';
  document.getElementById('themeToggleLabel').textContent = theme === 'dark' ? 'Mode Gelap' : 'Mode Terang';
}
document.getElementById('themeToggleBtn').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('studioTheme', next);
  applyThemeIcon();
});
applyThemeIcon();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/auth/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let currentLimits = null;

async function loadAccountInfo(){
  try {
    const res = await fetch('/api/me');
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    const me = await res.json();

    document.getElementById('welcomeText').textContent = me.org ? 'Tim: ' + me.org.name : 'Selamat datang kembali';
    document.getElementById('accRole').textContent = me.role === 'owner' ? '👑 Owner' : '👤 Member';
    currentLimits = me.limits || null;

    if (me.org && me.org.plan === 'pro') {
      document.getElementById('accPlan').textContent = '⭐ Pro';
      document.getElementById('accToken').textContent = 'Tanpa batas';
    } else {
      document.getElementById('accPlan').textContent = 'Gratis';
      const balance = me.org ? Number(me.org.tokenBalance) : 0;
      const total = me.limits ? Number(me.limits.includedTokens) : 0;
      document.getElementById('accToken').textContent = balance.toLocaleString('id-ID') + ' / ' + total.toLocaleString('id-ID');
    }

    // Kartu workspace butuh angka batas ini juga, refresh sekarang udah tau
    loadWorkspaceCards();
  } catch (e) {
    document.getElementById('welcomeText').textContent = 'Gagal memuat info akun';
  }
}

async function loadWorkspaceCards(){
  const grid = document.getElementById('workspaceGrid');
  try {
    const res = await fetch('/api/workspaces');
    if (res.status === 401) { window.location.href = '/login.html'; return; }
    const list = await res.json();

    document.getElementById('accWorkspaceCount').textContent = list.length;
    document.getElementById('wsCountBadge').textContent = list.length + ' workspace';

    let html = '';
    list.forEach(ws => {
      html += `
        <div class="ws-card" data-workspace-id="${escapeHtml(ws.id)}">
          <div>
            <div class="ws-tag">Workspace</div>
            <div class="ws-name" title="${escapeHtml(ws.name)}">${escapeHtml(ws.name)}</div>
          </div>
          <div class="ws-stats">
            <span>🌐 Publish <b>${ws.publishedCount}</b></span>
            <span>·</span>
            <span>📝 Draft <b>${ws.draftCount}</b></span>
            <span>·</span>
            <span>📄 Halaman <b>${ws.pageCount}${currentLimits ? '/' + currentLimits.maxPagesPerWorkspace : ''}</b></span>
          </div>
          <div class="ws-actions">
            <button class="btn primary" data-action="studio">Buka Studio</button>
            <button class="btn" data-action="articles" title="Generate artikel yang SEO-optimized">📰 Generate Articles</button>
          </div>
        </div>
      `;
    });
    html += `
      <div class="new-ws-card" id="newWorkspaceCard">
        <div class="plus">+</div>
        <div>Workspace Baru</div>
      </div>
    `;
    grid.innerHTML = html;

    // Klik di mana pun di kartu -> masuk Studio. Klik tombol tertentu -> aksi masing-masing.
    grid.querySelectorAll('.ws-card').forEach(card => {
      const wsId = card.dataset.workspaceId;
      card.addEventListener('click', () => { location.href = '/app?workspaceId=' + encodeURIComponent(wsId); });
      card.querySelector('[data-action="studio"]').addEventListener('click', (e) => {
        e.stopPropagation();
        location.href = '/app?workspaceId=' + encodeURIComponent(wsId);
      });
      card.querySelector('[data-action="articles"]').addEventListener('click', (e) => {
        e.stopPropagation();
        location.href = '/prompt-generator.html?workspaceId=' + encodeURIComponent(wsId);
      });
    });

    document.getElementById('newWorkspaceCard').addEventListener('click', () => {
      document.getElementById('workspaceNameInput').value = '';
      document.getElementById('workspaceModal').classList.add('show');
      document.getElementById('workspaceNameInput').focus();
    });
  } catch (e) {
    grid.innerHTML = '<div class="empty-hint">Gagal memuat workspace.</div>';
  }
}

document.getElementById('cancelWorkspaceBtn').addEventListener('click', () => {
  document.getElementById('workspaceModal').classList.remove('show');
});

document.getElementById('confirmWorkspaceBtn').addEventListener('click', async () => {
  const name = document.getElementById('workspaceNameInput').value.trim();
  if (!name) { alert('Isi nama workspace dulu ya.'); return; }
  try {
    const res = await fetch('/api/workspaces', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name })
    });
    const data = await res.json();
    if (res.status === 402) {
      document.getElementById('workspaceModal').classList.remove('show');
      if (confirm((data.error || 'Paket kamu sudah penuh.') + '\n\nBuka halaman upgrade sekarang?')) {
        window.location.href = '/billing.html';
      }
      return;
    }
    if (!res.ok) throw new Error(data.error || 'Gagal membuat workspace');
    document.getElementById('workspaceModal').classList.remove('show');
    loadWorkspaceCards();
  } catch (e) {
    alert('Gagal membuat workspace.\n\nDetail: ' + e.message);
  }
});

loadAccountInfo();
loadWorkspaceCards();
</script>

</body>
</html>
