<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daftar — Live Preview Studio</title>
<style>
  :root{ --bg:#0b0d10; --panel:#12151a; --line:#232830; --text:#e6e9ee; --muted:#8b93a1; --accent:#5eead4; }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  .card{ width:360px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px; }
  h1{ font-size:16px;margin:0 0 4px; }
  p.sub{ color:var(--muted);font-size:13px;margin:0 0 22px; }
  label{ font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px; }
  input{
    width:100%;background:#0d0f12;border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:8px;font-size:13.5px;margin-bottom:14px;outline:none;
  }
  input:focus{ border-color:var(--accent); }
  button{
    width:100%;background:var(--accent);color:#04211d;border:none;font-weight:600;
    padding:11px;border-radius:8px;font-size:13.5px;cursor:pointer;
  }
  .err{ background:#2a1010;color:#ff9c9c;border:1px solid #4a1c1c;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-bottom:14px;display:none; }
  .foot{ text-align:center;margin-top:18px;font-size:12.5px;color:var(--muted); }
  .foot a{ color:var(--accent);text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Daftar Tim Baru</h1>
    <p class="sub">Gratis buat 3 project pertama, upgrade kapan aja</p>
    <div class="err" id="err"></div>
    <form id="form">
      <label>Nama Tim / Perusahaan</label>
      <input type="text" id="orgName" required />
      <label>Email</label>
      <input type="email" id="email" required />
      <label>Password</label>
      <input type="password" id="password" required minlength="6" />
      <button type="submit">Daftar</button>
    </form>
    <div class="foot">Sudah punya akun? <a href="/login.html">Masuk</a></div>
  </div>

<script>
document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('err');
  errEl.style.display = 'none';
  const orgName = document.getElementById('orgName').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orgName, email, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Gagal daftar'; errEl.style.display = 'block'; return; }
    window.location.href = '/app';
  } catch (e2) {
    errEl.textContent = 'Gak bisa terhubung ke server.'; errEl.style.display = 'block';
  }
});
</script>
</body>
</html>
