<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Superadmin — Live Preview Studio</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#12151a; --panel-2:#171b21; --line:#232830;
    --text:#e6e9ee; --muted:#8b93a1; --accent:#5eead4; --accent-dim:#0f2e29;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  header h1{ font-size:15px; margin:0; font-weight:600; }
  header a{ color:var(--accent); text-decoration:none; font-size:12.5px; }
  .wrap{ max-width:1200px; margin:0 auto; padding:28px 22px; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card .num{ font-size:26px; font-weight:700; color:var(--accent); }
  .card .label{ font-size:12px; color:var(--muted); margin-top:4px; }
  h2{ font-size:15px; margin:0 0 14px; color:#c7ccd4; }
  table{ width:100%; border-collapse:collapse; background:var(--panel); border-radius:12px; overflow:hidden; }
  th, td{ text-align:left; padding:10px 14px; font-size:12.5px; border-bottom:1px solid var(--line); }
  th{ color:var(--muted); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:.05em; background:var(--panel-2); }
  tr:last-child td{ border-bottom:none; }
  .badge{ display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; }
  .badge.pro{ background:var(--accent-dim); color:var(--accent); }
  .badge.free{ background:var(--panel-2); color:var(--muted); }
  .loading{ color:var(--muted); font-size:13px; padding:20px; text-align:center; }
  .search-box{ margin-bottom:14px; }
  .search-box input{
    width:100%; max-width:320px; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; outline:none;
  }
  .settings-box{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:28px; }
  .settings-box .field{ margin-bottom:14px; max-width:420px; }
  .settings-box label{ display:block; font-size:12px; font-weight:600; color:#c7ccd4; margin-bottom:6px; }
  .settings-box select, .settings-box input[type=text]{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:8px; font-size:13px; outline:none;
  }
  .settings-box .hint{ font-size:11.5px; color:var(--muted); margin-top:6px; }
  .btn-save{
    background:var(--accent); color:#04211d; border:none; padding:9px 18px;
    border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
  }
  .plan-row{ display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .plan-row .plan-name{ width:70px; font-weight:700; text-transform:capitalize; font-size:13px; }
  .plan-row .plan-field{ display:flex; flex-direction:column; gap:4px; }
  .plan-row .plan-field label{ font-size:10.5px; color:var(--muted); }
  .plan-row .plan-field input{
    width:100px; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:7px 9px; border-radius:7px; font-size:12.5px; outline:none;
  }
</style>
</head>
<body>

<header>
  <h1>🛡️ Panel Superadmin</h1>
  <a href="/app">← Kembali ke tool</a>
</header>

<div class="wrap">
  <div class="cards" id="cards">
    <div class="loading">Memuat data...</div>
  </div>

  <h2>📦 Pengaturan Paket</h2>
  <div class="settings-box" id="plansBox">
    <div class="loading">Memuat paket...</div>
  </div>

  <h2>⚙️ Pengaturan AI</h2>
  <div class="settings-box" id="settingsBox">
    <div class="field">
      <label>Pakai AI dari mana?</label>
      <select id="providerSelect">
        <option value="anthropic">Anthropic (langsung)</option>
        <option value="sumopod">Sumopod (ai.sumopod.com)</option>
      </select>
    </div>

    <div id="anthropicFields">
      <div class="field">
        <label>Model Anthropic</label>
        <select id="anthropicModelSelect"></select>
      </div>
      <div class="field">
        <label>API Key Anthropic</label>
        <input type="text" id="anthropicApiKeyInput" placeholder="sk-ant-... (kosongkan kalau gak mau ganti)" />
        <p class="hint" id="anthropicKeyHint"></p>
      </div>
    </div>

    <div id="sumopodFields" style="display:none;">
      <div class="field">
        <label>Nama Model di Sumopod</label>
        <input type="text" id="sumopodModelInput" placeholder="misal: claude-sonnet-4-6, gpt-5.2, gemini/gemini-2.5-flash" />
        <p class="hint">Cek daftar model lengkap & harganya di ai.sumopod.com → AI → Model Hub.</p>
      </div>
      <div class="field">
        <label>API Key Sumopod</label>
        <input type="text" id="sumopodApiKeyInput" placeholder="sk-... (kosongkan kalau gak mau ganti)" />
        <p class="hint" id="sumopodKeyHint"></p>
      </div>
    </div>

    <button class="btn-save" id="saveSettingsBtn">Simpan Pengaturan</button>
    <span id="saveSettingsStatus" style="margin-left:10px;font-size:12.5px;color:var(--muted);"></span>
  </div>

  <h2>Daftar Semua Tim</h2>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama tim..." />
  </div>
  <table>
    <thead>
      <tr>
        <th>Nama Tim</th>
        <th>Paket</th>
        <th>User</th>
        <th>Workspace</th>
        <th>Halaman</th>
        <th>Publish</th>
        <th>AI Generate</th>
        <th>Token In/Out</th>
        <th>Terdaftar</th>
      </tr>
    </thead>
    <tbody id="orgTableBody">
      <tr><td colspan="9" class="loading">Memuat...</td></tr>
    </tbody>
  </table>
</div>

<script>
let allOrgs = [];

async function loadStats(){
  try {
    const res = await fetch('/api/superadmin/stats');
    if (res.status === 403) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff9c9c;">Kamu gak punya akses ke halaman ini.</div>';
      return;
    }
    if (!res.ok) throw new Error('Gagal memuat data');
    const data = await res.json();
    renderCards(data.summary);
    allOrgs = data.orgs;
    renderTable(allOrgs);
  } catch (e) {
    document.getElementById('cards').innerHTML = '<div class="loading">Gagal memuat: ' + e.message + '</div>';
  }
}

function renderCards(s){
  const items = [
    { label: 'Total Tim', value: s.totalOrgs },
    { label: 'Tim Pro', value: s.totalProOrgs },
    { label: 'Total User', value: s.totalUsers },
    { label: 'Total Workspace', value: s.totalWorkspaces },
    { label: 'Total Halaman', value: s.totalPages },
    { label: 'Total Publish', value: s.totalPublishes },
    { label: 'Total AI Generate', value: s.totalAiGenerations },
    { label: 'Token Input Terpakai', value: s.totalInputTokens.toLocaleString('id-ID') },
    { label: 'Token Output Terpakai', value: s.totalOutputTokens.toLocaleString('id-ID') },
    { label: 'Estimasi Biaya AI', value: '$' + s.estimatedCostUSD.toFixed(3) }
  ];
  document.getElementById('cards').innerHTML = items.map(it =>
    '<div class="card"><div class="num">' + it.value + '</div><div class="label">' + it.label + '</div></div>'
  ).join('');
}

function renderTable(orgs){
  const tbody = document.getElementById('orgTableBody');
  if (orgs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">Belum ada tim.</td></tr>';
    return;
  }
  tbody.innerHTML = orgs.map(o => {
    const date = o.createdAt ? new Date(Number(o.createdAt)).toLocaleDateString('id-ID') : '-';
    return '<tr>' +
      '<td>' + escapeHtml(o.name) + '</td>' +
      '<td><span class="badge ' + o.plan + '">' + (o.plan === 'pro' ? 'Pro' : 'Gratis') + '</span></td>' +
      '<td>' + o.userCount + '</td>' +
      '<td>' + o.workspaceCount + '</td>' +
      '<td>' + o.pageCount + '</td>' +
      '<td>' + o.publishCount + '</td>' +
      '<td>' + o.aiGenerationsUsed + '</td>' +
      '<td>' + Number(o.aiInputTokens).toLocaleString('id-ID') + ' / ' + Number(o.aiOutputTokens).toLocaleString('id-ID') + '</td>' +
      '<td>' + date + '</td>' +
      '</tr>';
  }).join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderTable(allOrgs.filter(o => o.name.toLowerCase().includes(q)));
});

loadStats();

// ---------- Pengaturan Paket ----------
async function loadPlans(){
  try {
    const res = await fetch('/api/superadmin/plans');
    if (!res.ok) return;
    const plans = await res.json();
    const box = document.getElementById('plansBox');
    box.innerHTML = plans.map(p => `
      <div class="plan-row" data-plan="${p.name}">
        <div class="plan-name">${p.name}</div>
        <div class="plan-field"><label>Max Workspace</label><input type="number" min="0" class="f-workspaces" value="${p.maxWorkspaces}" /></div>
        <div class="plan-field"><label>Max Halaman/Workspace</label><input type="number" min="0" class="f-pages" value="${p.maxPagesPerWorkspace}" /></div>
        <div class="plan-field"><label>Max Member/Workspace</label><input type="number" min="0" class="f-members" value="${p.maxMembersPerWorkspace}" /></div>
        <div class="plan-field"><label>Max AI Generate</label><input type="number" min="0" class="f-ai" value="${p.maxAiGenerations}" /></div>
        <button class="btn-save save-plan-btn" style="align-self:flex-end;">Simpan</button>
        <span class="plan-save-status" style="font-size:12px;color:var(--muted);align-self:flex-end;"></span>
      </div>
    `).join('');

    box.querySelectorAll('.save-plan-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const row = btn.closest('.plan-row');
        const planName = row.dataset.plan;
        const statusEl = row.querySelector('.plan-save-status');
        statusEl.textContent = 'Menyimpan...';
        try {
          const res = await fetch('/api/superadmin/plans/' + planName, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              maxWorkspaces: parseInt(row.querySelector('.f-workspaces').value, 10),
              maxPagesPerWorkspace: parseInt(row.querySelector('.f-pages').value, 10),
              maxMembersPerWorkspace: parseInt(row.querySelector('.f-members').value, 10),
              maxAiGenerations: parseInt(row.querySelector('.f-ai').value, 10)
            })
          });
          if (!res.ok) throw new Error('Gagal menyimpan');
          statusEl.textContent = 'Tersimpan ✓';
          setTimeout(() => { statusEl.textContent = ''; }, 2000);
        } catch (e) {
          statusEl.textContent = 'Gagal: ' + e.message;
        }
      });
    });
  } catch (e) {
    document.getElementById('plansBox').innerHTML = '<div class="loading">Gagal memuat paket.</div>';
  }
}
loadPlans();

// ---------- Pengaturan AI ----------
function keySourceText(src){
  return src === 'database' ? 'Diatur lewat panel ini' :
    src === 'env' ? 'Diatur lewat env var Railway' : 'Belum diset sama sekali';
}

function syncProviderFields(){
  const provider = document.getElementById('providerSelect').value;
  document.getElementById('anthropicFields').style.display = provider === 'anthropic' ? 'block' : 'none';
  document.getElementById('sumopodFields').style.display = provider === 'sumopod' ? 'block' : 'none';
}

async function loadAiSettings(){
  try {
    const res = await fetch('/api/superadmin/settings');
    if (!res.ok) return;
    const s = await res.json();

    document.getElementById('providerSelect').value = s.provider;
    syncProviderFields();

    const modelSelect = document.getElementById('anthropicModelSelect');
    modelSelect.innerHTML = s.anthropic.availableModels.map(m =>
      '<option value="' + m + '"' + (m === s.anthropic.model ? ' selected' : '') + '>' + m + '</option>'
    ).join('');
    document.getElementById('anthropicKeyHint').textContent = keySourceText(s.anthropic.keySource);

    document.getElementById('sumopodModelInput').value = s.sumopod.model;
    document.getElementById('sumopodKeyHint').textContent = keySourceText(s.sumopod.keySource);
  } catch (e) { /* biarin */ }
}
loadAiSettings();

document.getElementById('providerSelect').addEventListener('change', syncProviderFields);

document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
  const provider = document.getElementById('providerSelect').value;
  const anthropicModel = document.getElementById('anthropicModelSelect').value;
  const anthropicApiKey = document.getElementById('anthropicApiKeyInput').value.trim();
  const sumopodModel = document.getElementById('sumopodModelInput').value.trim();
  const sumopodApiKey = document.getElementById('sumopodApiKeyInput').value.trim();
  const statusEl = document.getElementById('saveSettingsStatus');
  statusEl.textContent = 'Menyimpan...';
  try {
    const res = await fetch('/api/superadmin/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        provider,
        anthropicModel,
        anthropicApiKey: anthropicApiKey || undefined,
        sumopodModel,
        sumopodApiKey: sumopodApiKey || undefined
      })
    });
    if (!res.ok) throw new Error('Gagal menyimpan');
    statusEl.textContent = 'Tersimpan ✓';
    document.getElementById('anthropicApiKeyInput').value = '';
    document.getElementById('sumopodApiKeyInput').value = '';
    loadAiSettings();
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } catch (e) {
    statusEl.textContent = 'Gagal: ' + e.message;
  }
});
</script>

</body>
</html>
