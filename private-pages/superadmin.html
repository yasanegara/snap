<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Superadmin — Live Preview Studio</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#12151a; --panel-2:#171b21; --line:#232830;
    --text:#e6e9ee; --muted:#8b93a1; --accent:#5eead4; --accent-dim:#0f2e29;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 22px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  header h1{ font-size:15px; margin:0; font-weight:600; }
  header a{ color:var(--accent); text-decoration:none; font-size:12.5px; }
  .wrap{ max-width:1200px; margin:0 auto; padding:28px 22px; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:28px; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px; }
  .card .num{ font-size:26px; font-weight:700; color:var(--accent); }
  .card .label{ font-size:12px; color:var(--muted); margin-top:4px; }
  h2{ font-size:15px; margin:0 0 14px; color:#c7ccd4; }
  table{ width:100%; border-collapse:collapse; background:var(--panel); border-radius:12px; overflow:hidden; }
  th, td{ text-align:left; padding:10px 14px; font-size:12.5px; border-bottom:1px solid var(--line); }
  th{ color:var(--muted); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:.05em; background:var(--panel-2); }
  tr:last-child td{ border-bottom:none; }
  .badge{ display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; }
  .badge.pro{ background:var(--accent-dim); color:var(--accent); }
  .badge.free{ background:var(--panel-2); color:var(--muted); }
  .loading{ color:var(--muted); font-size:13px; padding:20px; text-align:center; }
  .search-box{ margin-bottom:14px; }
  .search-box input{
    width:100%; max-width:320px; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; outline:none;
  }
  .settings-box{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:28px; }
  .settings-box .field{ margin-bottom:14px; max-width:420px; }
  .settings-box label{ display:block; font-size:12px; font-weight:600; color:#c7ccd4; margin-bottom:6px; }
  .settings-box select, .settings-box input[type=text]{
    width:100%; background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:9px 12px; border-radius:8px; font-size:13px; outline:none;
  }
  .settings-box .hint{ font-size:11.5px; color:var(--muted); margin-top:6px; }
  .btn-save{
    background:var(--accent); color:#04211d; border:none; padding:9px 18px;
    border-radius:8px; font-size:13px; font-weight:700; cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🛡️ Panel Superadmin</h1>
  <a href="/app">← Kembali ke tool</a>
</header>

<div class="wrap">
  <div class="cards" id="cards">
    <div class="loading">Memuat data...</div>
  </div>

  <h2>⚙️ Pengaturan AI</h2>
  <div class="settings-box" id="settingsBox">
    <div class="field">
      <label>Model AI yang dipakai</label>
      <select id="modelSelect"></select>
    </div>
    <div class="field">
      <label>API Key Anthropic</label>
      <input type="text" id="apiKeyInput" placeholder="sk-ant-... (kosongkan kalau gak mau ganti)" />
      <p class="hint" id="apiKeySourceHint"></p>
    </div>
    <button class="btn-save" id="saveSettingsBtn">Simpan Pengaturan</button>
    <span id="saveSettingsStatus" style="margin-left:10px;font-size:12.5px;color:var(--muted);"></span>
  </div>

  <h2>Daftar Semua Tim</h2>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Cari nama tim..." />
  </div>
  <table>
    <thead>
      <tr>
        <th>Nama Tim</th>
        <th>Paket</th>
        <th>User</th>
        <th>Workspace</th>
        <th>Halaman</th>
        <th>Publish</th>
        <th>AI Generate</th>
        <th>Token In/Out</th>
        <th>Terdaftar</th>
      </tr>
    </thead>
    <tbody id="orgTableBody">
      <tr><td colspan="9" class="loading">Memuat...</td></tr>
    </tbody>
  </table>
</div>

<script>
let allOrgs = [];

async function loadStats(){
  try {
    const res = await fetch('/api/superadmin/stats');
    if (res.status === 403) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#ff9c9c;">Kamu gak punya akses ke halaman ini.</div>';
      return;
    }
    if (!res.ok) throw new Error('Gagal memuat data');
    const data = await res.json();
    renderCards(data.summary);
    allOrgs = data.orgs;
    renderTable(allOrgs);
  } catch (e) {
    document.getElementById('cards').innerHTML = '<div class="loading">Gagal memuat: ' + e.message + '</div>';
  }
}

function renderCards(s){
  const items = [
    { label: 'Total Tim', value: s.totalOrgs },
    { label: 'Tim Pro', value: s.totalProOrgs },
    { label: 'Total User', value: s.totalUsers },
    { label: 'Total Workspace', value: s.totalWorkspaces },
    { label: 'Total Halaman', value: s.totalPages },
    { label: 'Total Publish', value: s.totalPublishes },
    { label: 'Total AI Generate', value: s.totalAiGenerations },
    { label: 'Token Input Terpakai', value: s.totalInputTokens.toLocaleString('id-ID') },
    { label: 'Token Output Terpakai', value: s.totalOutputTokens.toLocaleString('id-ID') },
    { label: 'Estimasi Biaya AI', value: '$' + s.estimatedCostUSD.toFixed(3) }
  ];
  document.getElementById('cards').innerHTML = items.map(it =>
    '<div class="card"><div class="num">' + it.value + '</div><div class="label">' + it.label + '</div></div>'
  ).join('');
}

function renderTable(orgs){
  const tbody = document.getElementById('orgTableBody');
  if (orgs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="loading">Belum ada tim.</td></tr>';
    return;
  }
  tbody.innerHTML = orgs.map(o => {
    const date = o.createdAt ? new Date(Number(o.createdAt)).toLocaleDateString('id-ID') : '-';
    return '<tr>' +
      '<td>' + escapeHtml(o.name) + '</td>' +
      '<td><span class="badge ' + o.plan + '">' + (o.plan === 'pro' ? 'Pro' : 'Gratis') + '</span></td>' +
      '<td>' + o.userCount + '</td>' +
      '<td>' + o.workspaceCount + '</td>' +
      '<td>' + o.pageCount + '</td>' +
      '<td>' + o.publishCount + '</td>' +
      '<td>' + o.aiGenerationsUsed + '</td>' +
      '<td>' + Number(o.aiInputTokens).toLocaleString('id-ID') + ' / ' + Number(o.aiOutputTokens).toLocaleString('id-ID') + '</td>' +
      '<td>' + date + '</td>' +
      '</tr>';
  }).join('');
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  renderTable(allOrgs.filter(o => o.name.toLowerCase().includes(q)));
});

loadStats();

// ---------- Pengaturan AI ----------
async function loadAiSettings(){
  try {
    const res = await fetch('/api/superadmin/settings');
    if (!res.ok) return;
    const s = await res.json();
    const modelSelect = document.getElementById('modelSelect');
    modelSelect.innerHTML = s.availableModels.map(m =>
      '<option value="' + m + '"' + (m === s.model ? ' selected' : '') + '>' + m + '</option>'
    ).join('');
    const sourceText = s.apiKeySource === 'database' ? 'Diatur lewat panel ini' :
      s.apiKeySource === 'env' ? 'Diatur lewat env var Railway (ANTHROPIC_API_KEY)' : 'Belum diset sama sekali';
    document.getElementById('apiKeySourceHint').textContent =
      (s.apiKeyMasked ? 'Key aktif sekarang: ' + s.apiKeyMasked + ' — ' : '') + sourceText;
  } catch (e) { /* biarin */ }
}
loadAiSettings();

document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
  const model = document.getElementById('modelSelect').value;
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const statusEl = document.getElementById('saveSettingsStatus');
  statusEl.textContent = 'Menyimpan...';
  try {
    const res = await fetch('/api/superadmin/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, apiKey: apiKey || undefined })
    });
    if (!res.ok) throw new Error('Gagal menyimpan');
    statusEl.textContent = 'Tersimpan ✓';
    document.getElementById('apiKeyInput').value = '';
    loadAiSettings();
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } catch (e) {
    statusEl.textContent = 'Gagal: ' + e.message;
  }
});
</script>

</body>
</html>
